<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Festa Medieval</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=MedievalSharp&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark: #1a110b;          
            --bg-gradient: #2c1e16;      
            --gold: #d4af37;             
            --dark-gold: #997a00;
            --burgundy: #58181f;         
            --parchment: #f1e4c3;        
            --parchment-dark: #d5c39a;   
            --stone: #3a3b3c;            
            --text-light: #f5f0e6;
        }

        body {
            font-family: 'MedievalSharp', serif;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at center, var(--bg-gradient) 0%, var(--bg-dark) 100%);
            color: var(--text-light);
            margin: 0;
            padding: 20px;
            text-align: center;
            min-height: 100vh;
        }

        h1, h2, h3, .category-header, button {
            font-family: 'Cinzel', serif;
        }

        h1 { 
            color: var(--gold); 
            font-size: 50px; 
            text-shadow: 3px 3px 6px #000;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }

        /* Setup Screen */
        #setup-screen { margin-top: 30px; }
        .setup-box {
            background-color: rgba(20, 10, 5, 0.8);
            padding: 40px;
            border-radius: 5px;
            border: 3px solid var(--gold);
            display: inline-block;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        
        select, input {
            padding: 10px;
            margin: 10px;
            font-size: 18px;
            border-radius: 3px;
            border: 2px solid var(--gold);
            background-color: var(--parchment);
            font-family: 'MedievalSharp', serif;
            color: #333;
        }

        button {
            cursor: pointer;
            background: linear-gradient(to bottom, var(--gold), var(--dark-gold));
            color: #111;
            font-weight: bold;
            font-size: 18px;
            padding: 12px 20px;
            margin: 10px;
            border: 2px solid #000;
            border-radius: 3px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.8);
            transition: transform 0.1s, filter 0.3s;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.3);
        }
        button:active:not(:disabled) { transform: scale(0.95); }
        button:hover:not(:disabled) { filter: brightness(1.2); }
        button:disabled { filter: grayscale(1); opacity: 0.3; cursor: not-allowed; }
        
        .admin-btn { background: linear-gradient(to bottom, #4a6fa5, #2b456b); color: var(--parchment); }
        .export-btn { background: linear-gradient(to bottom, #3b7a57, #1f4731); color: var(--parchment); }
        .import-btn { background: linear-gradient(to bottom, #b85d19, #7a3a0c); color: var(--parchment); }

        #team-inputs {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Game Board */
        #game-screen { display: none; }
        .board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            max-width: 1100px;
            margin: 20px auto;
        }
        .category-header {
            background-color: #110b07;
            color: var(--gold);
            font-weight: 800;
            padding: 15px 5px;
            text-transform: uppercase;
            font-size: 20px;
            border: 2px solid var(--gold);
            border-radius: 3px;
            text-shadow: 2px 2px 4px #000;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }
        .card {
            background-color: var(--burgundy);
            color: var(--gold);
            font-size: 28px;
            font-weight: bold;
            padding: 30px 10px;
            cursor: pointer;
            border: 2px solid var(--gold);
            border-radius: 5px;
            transition: transform 0.1s, border-color 0.3s;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8), 3px 3px 6px rgba(0,0,0,0.5);
            text-shadow: 2px 2px 3px black;
        }
        .card:hover { 
            transform: scale(1.05); 
            border-color: #ffdf70;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5), 0 0 15px var(--gold);
        }
        .card.disabled {
            background-color: var(--stone);
            color: #1a1a1a;
            cursor: not-allowed;
            border-color: #222;
            box-shadow: inset 0 0 20px #000;
            text-shadow: none;
        }

        /* Scoreboard & Jokers Integrats */
        .scoreboard {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 25px;
        }
        .player-score {
            background-color: rgba(0,0,0,0.6);
            padding: 15px 20px;
            border-radius: 5px;
            font-size: 22px;
            border: 2px solid var(--gold);
            color: var(--parchment);
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            min-width: 220px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .player-score.active { 
            background-color: var(--burgundy); 
            border-color: #ffdf70;
            box-shadow: 0 0 15px var(--gold);
        }
        
        .mini-jokers {
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px dashed var(--dark-gold);
            display: flex;
            justify-content: center;
            gap: 5px;
        }
        .joker-btn-mini {
            padding: 6px 8px;
            font-size: 13px;
            margin: 0;
            border-width: 1px;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        /* Modals (Question & Admin) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background-image: url('https://www.transparenttextures.com/patterns/aged-paper.png');
            background-color: var(--parchment);
            color: #222;
            padding: 40px;
            border-radius: 5px;
            max-width: 800px;
            width: 90%;
            border: 6px solid var(--dark-gold);
            box-shadow: 0 0 30px #000, inset 0 0 50px rgba(139, 69, 19, 0.3);
            position: relative;
        }
        .modal-content h2 {
            font-size: 32px;
            margin-bottom: 10px;
            color: var(--burgundy);
            text-shadow: 1px 1px 0px rgba(255,255,255,0.5);
        }
        
        /* IMATGE CENTRADA */
        .modal-content img {
            display: block;
            margin: 0 auto 20px auto; 
            max-width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 5px;
            border: 4px solid var(--burgundy);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }
        .option-btn {
            background: var(--parchment-dark);
            color: #111;
            padding: 20px;
            font-size: 20px;
            font-family: 'MedievalSharp', serif;
            border: 2px solid #5a4030;
            border-radius: 3px;
            text-shadow: none;
        }
        .option-btn:hover:not(:disabled) { 
            background: #e6d5aa; 
        }
        .option-btn:disabled { cursor: not-allowed; }

        /* Colors de Feedback */
        .option-btn.correct {
            background: #27ae60 !important; 
            color: white !important;
            border-color: #000;
            text-shadow: 1px 1px 2px #000;
        }
        .option-btn.incorrect {
            background: #c0392b !important; 
            color: white !important;
            border-color: #000;
            text-shadow: 1px 1px 2px #000;
        }

        #feedback-message {
            font-size: 30px;
            font-weight: bold;
            margin-top: 25px;
            display: none;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        /* Admin Form */
        .admin-form { text-align: left; max-height: 85vh; overflow-y: auto; }
        .admin-form label { display: block; margin-top: 15px; font-weight: bold; color: var(--burgundy); }
        .admin-form input, .admin-form select { width: 100%; margin-top: 5px; background-color: white; box-sizing: border-box; }
        .close-btn { background: linear-gradient(to bottom, #c0392b, #7a241b); color: white; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h1>FESTA MEDIEVAL</h1>
        <div class="setup-box">
            <label for="player-count" style="font-size: 22px; color: var(--gold); font-family: 'Cinzel', serif;">Nombre de Gremis (Equips):</label><br>
            <select id="player-count" onchange="updateTeamInputs()">
                <option value="1">1 Gremi</option>
                <option value="2">2 Gremis</option>
                <option value="3">3 Gremis</option>
            </select><br>

            <div id="team-inputs">
                <input type="text" id="team-1" placeholder="Nom del Gremi 1" value="Gremi 1">
                <input type="text" id="team-2" placeholder="Nom del Gremi 2" value="Gremi 2" style="display:none;">
                <input type="text" id="team-3" placeholder="Nom del Gremi 3" value="Gremi 3" style="display:none;">
            </div>

            <button onclick="startGame()" style="margin-top: 25px; font-size: 24px; padding: 15px 40px;">Que comenci la justa!</button>
            
            <br><br><hr style="border-color: var(--dark-gold); margin: 30px 0;"><br>
            
            <button class="admin-btn" onclick="openAdmin()">📜 Editar Pergamins (Admin)</button>
            <div style="margin-top: 15px;">
                <button class="export-btn" onclick="exportData()">💾 Desar Fitxer</button>
                <button class="import-btn" onclick="document.getElementById('import-file').click()">📂 Carregar Fitxer</button>
                <input type="file" id="import-file" style="display:none;" accept=".json" onchange="importData(event)">
            </div>
        </div>
    </div>

    <div id="game-screen">
        <h2 id="turn-indicator" style="color: var(--gold); margin-top: 0; margin-bottom: 10px; text-shadow: 2px 2px 4px #000;"></h2>
        <div class="scoreboard" id="scoreboard"></div>
        
        <div class="board" id="board"></div>
        
        <button style="margin-top: 40px;" onclick="location.reload()">Tornar al Castell (Inici)</button>
    </div>

    <div id="question-modal" class="modal">
        <div class="modal-content">
            <h3 id="answering-indicator" style="color: var(--burgundy); border-bottom: 2px solid var(--dark-gold); padding-bottom: 10px; margin-top: 0; display: none;"></h3>
            <img id="q-image" src="" alt="Imatge de pregunta" onerror="this.style.display='none'">
            <h2 id="q-text">Pregunta...</h2>
            
            <div id="action-area">
                <div class="options-grid" id="q-options"></div>
            </div>

            <div id="feedback-message"></div>
        </div>
    </div>

    <div id="target-modal" class="modal" style="z-index: 1100;">
        <div class="modal-content" style="max-width: 450px; text-align: center;">
            <h2 id="target-title" style="color: var(--burgundy);">A quin Gremi vols aplicar el teu atac?</h2>
            <div id="target-options" style="display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; margin-top: 25px;"></div>
            <button id="cancel-target-btn" class="close-btn" style="margin-top: 30px;" onclick="cancelTarget()">Cancel·lar Comodí</button>
        </div>
    </div>

    <div id="admin-modal" class="modal">
        <div class="modal-content admin-form">
            <h2 style="text-align: center; margin-top: 0;">Sala d'Escribes (Administració)</h2>
            <label>Selecciona el pergamí a editar:</label>
            <select id="edit-selector" onchange="loadQuestionForEdit()"></select>
            <label>Categoria:</label><input type="text" id="edit-category">
            
            <label>URL o Fitxer Local de la Pintura/Imatge:</label>
            <div style="display: flex; gap: 10px; align-items: center;">
                <input type="text" id="edit-image" placeholder="Enganxa una URL o puja un fitxer local..." style="flex-grow: 1;">
                <button type="button" onclick="document.getElementById('edit-image-file').click()" style="margin: 0; padding: 10px 15px; font-size: 14px; white-space: nowrap;">📁 Pujar Local</button>
                <input type="file" id="edit-image-file" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
            </div>
            
            <label>Pregunta:</label><input type="text" id="edit-question">
            <label>Opció 1:</label><input type="text" id="edit-opt0">
            <label>Opció 2:</label><input type="text" id="edit-opt1">
            <label>Opció 3:</label><input type="text" id="edit-opt2">
            <label>Opció 4:</label><input type="text" id="edit-opt3">
            <label>Resposta Correcta:</label>
            <select id="edit-correct">
                <option value="0">Opció 1</option>
                <option value="1">Opció 2</option>
                <option value="2">Opció 3</option>
                <option value="3">Opció 4</option>
            </select>
            <div style="text-align: center; margin-top: 30px;">
                <button onclick="saveQuestionEdit()">Segellar Canvis</button>
                <button class="close-btn" onclick="closeAdmin()">Tancar Panell</button>
            </div>
        </div>
    </div>

    <script>
        const defaultCategories = ["Història", "Alquímia", "Geografia", "Justes", "Llegendes"];
        const pointValues = [100, 200, 300, 400, 500];
        let gameData = [];
        let players = [];
        let currentPlayer = 0;
        let currentQuestionId = null;
        let activeJoker = null; 
        let pendingJokerType = null;

        window.onload = () => {
            initData();
            updateTeamInputs();
        };

        function updateTeamInputs() {
            const count = parseInt(document.getElementById('player-count').value);
            document.getElementById('team-1').style.display = count >= 1 ? 'block' : 'none';
            document.getElementById('team-2').style.display = count >= 2 ? 'block' : 'none';
            document.getElementById('team-3').style.display = count >= 3 ? 'block' : 'none';
        }

        function initData() {
            const savedData = localStorage.getItem('jeopardyData');
            if (savedData) gameData = JSON.parse(savedData);
            else generateDefaultData();
        }

        function generateDefaultData() {
            gameData = [];
            for (let col = 0; col < 5; col++) {
                for (let row = 0; row < 5; row++) {
                    gameData.push({
                        id: `${col}-${row}`,
                        col: col,
                        row: row,
                        category: defaultCategories[col],
                        points: pointValues[row],
                        image: 'https://images.unsplash.com/photo-1542382103-6058eb7db6b3?w=500&q=80',
                        question: `Enigma de ${defaultCategories[col]} per ${pointValues[row]} monedes d'or.`,
                        options: ["Resposta A", "Resposta B", "Resposta C", "Resposta D"],
                        correctIndex: 0,
                        answered: false
                    });
                }
            }
            saveData();
        }

        function saveData() { localStorage.setItem('jeopardyData', JSON.stringify(gameData)); }

        function exportData() {
            const dataStr = JSON.stringify(gameData, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "festa_medieval_preguntes.json";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if (Array.isArray(importedData) && importedData.length === 25) {
                        gameData = importedData;
                        saveData(); 
                        alert("Pergamins restaurats! Les preguntes s'han actualitzat.");
                    } else alert("Error: El pergamí no té la màgia correcta.");
                } catch (error) { alert("Error en desxifrar el pergamí."); }
                document.getElementById('import-file').value = ""; 
            };
            reader.readAsText(file);
        }

        function startGame() {
            const count = parseInt(document.getElementById('player-count').value);
            players = [];
            
            for(let i = 0; i < count; i++) {
                let teamName = document.getElementById(`team-${i+1}`).value.trim();
                if (teamName === '') teamName = `Gremi ${i+1}`;
                players.push({ 
                    name: teamName, 
                    score: 0,
                    jokers: { double: true, attack: true, pass: true } 
                });
            }
            
            currentPlayer = 0;
            activeJoker = null;
            gameData.forEach(q => q.answered = false);
            
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            
            renderBoard();
            updateScoreboard();
        }

        function renderBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            for (let col = 0; col < 5; col++) {
                const headerObj = gameData.find(q => q.col === col && q.row === 0);
                const div = document.createElement('div');
                div.className = 'category-header';
                div.textContent = headerObj.category;
                board.appendChild(div);
            }
            for (let row = 0; row < 5; row++) {
                for (let col = 0; col < 5; col++) {
                    const qData = gameData.find(q => q.col === col && q.row === row);
                    const div = document.createElement('div');
                    div.className = 'card' + (qData.answered ? ' disabled' : '');
                    div.textContent = qData.answered ? '' : qData.points;
                    if (!qData.answered) div.onclick = () => openQuestion(qData.id);
                    board.appendChild(div);
                }
            }
        }

        function updateScoreboard() {
            const sb = document.getElementById('scoreboard');
            sb.innerHTML = '';
            
            const isAnyActive = activeJoker !== null;

            players.forEach((p, index) => {
                const div = document.createElement('div');
                div.className = 'player-score' + (index === currentPlayer ? ' active' : '');
                
                const infoDiv = document.createElement('div');
                infoDiv.innerHTML = `<strong>${p.name}</strong><br>💰 ${p.score}`;
                div.appendChild(infoDiv);

                const jokersDiv = document.createElement('div');
                jokersDiv.className = 'mini-jokers';
                
                const isCurrent = (index === currentPlayer);

                const createJokerBtn = (type, icon, text, glowColor) => {
                    const btn = document.createElement('button');
                    btn.className = 'joker-btn-mini';
                    btn.textContent = `${icon} ${text}`;
                    btn.title = text;

                    if (!p.jokers[type]) {
                        btn.disabled = true;
                        btn.style.opacity = '0.2';
                        btn.style.filter = 'grayscale(1)';
                        btn.style.cursor = 'not-allowed';
                    } else if (!isCurrent) {
                        btn.disabled = true;
                        btn.style.opacity = '0.6';
                    } else if (isAnyActive && activeJoker.type !== type) {
                        btn.disabled = true;
                        btn.style.opacity = '0.6';
                    } else {
                        btn.onclick = () => activateJoker(type);
                        if (activeJoker && activeJoker.type === type) {
                            btn.style.boxShadow = `0 0 15px ${glowColor}`;
                        }
                    }
                    return btn;
                };

                jokersDiv.appendChild(createJokerBtn('double', '⚔️', 'x2', '#27ae60'));
                
                if (players.length > 1) {
                    jokersDiv.appendChild(createJokerBtn('attack', '🏹', 'Atc', '#c0392b'));
                    jokersDiv.appendChild(createJokerBtn('pass', '🛡️', 'Cedir', '#f39c12'));
                }

                div.appendChild(jokersDiv);
                sb.appendChild(div);
            });
            document.getElementById('turn-indicator').textContent = `Torn actual: ${players[currentPlayer].name}`;
        }

        // --- LÒGICA DE COMODINS ---
        function activateJoker(type) {
            const p = players[currentPlayer];
            
            if (activeJoker && activeJoker.type === type) {
                activeJoker = null;
                p.jokers[type] = true;
                updateScoreboard();
                return;
            }
            
            if (activeJoker) return; 

            if (type === 'double') {
                activeJoker = { type: 'double', target: null };
                p.jokers.double = false;
                updateScoreboard();
            } else if (type === 'pass') {
                activeJoker = { type: 'pass', target: null }; 
                p.jokers.pass = false;
                updateScoreboard();
            } else if (type === 'attack') {
                pendingJokerType = 'attack';
                showTargetModal();
            }
        }

        function showTargetModal() {
            const options = document.getElementById('target-options');
            options.innerHTML = '';
            
            document.getElementById('target-title').textContent = "A quin Gremi vols aplicar el teu atac?";

            players.forEach((p, index) => {
                if (index !== currentPlayer) {
                    const btn = document.createElement('button');
                    btn.textContent = p.name;
                    btn.onclick = () => selectTarget(index);
                    options.appendChild(btn);
                }
            });
            document.getElementById('target-modal').style.display = 'flex';
        }

        function selectTarget(targetIndex) {
            if (pendingJokerType === 'attack') {
                activeJoker = { type: 'attack', target: targetIndex };
                players[currentPlayer].jokers.attack = false;
                document.getElementById('target-modal').style.display = 'none';
                updateScoreboard();
            }
        }

        function cancelTarget() {
            if (pendingJokerType === 'attack') {
                players[currentPlayer].jokers.attack = true; 
            }
            document.getElementById('target-modal').style.display = 'none';
            updateScoreboard();
        }

        // --- OBERTURA I COMPROVACIÓ DE PREGUNTA ---
        function openQuestion(id) {
            currentQuestionId = id;
            const qData = gameData.find(q => q.id === id);
            
            const feedbackEl = document.getElementById('feedback-message');
            feedbackEl.style.display = 'none';
            feedbackEl.textContent = '';

            const indicatorEl = document.getElementById('answering-indicator');
            indicatorEl.style.display = 'none'; 

            const imgEl = document.getElementById('q-image');
            if(qData.image) {
                imgEl.src = qData.image;
                imgEl.style.display = 'block';
            } else {
                imgEl.style.display = 'none';
            }

            document.getElementById('q-text').textContent = qData.question;
            
            const oldTargetContainer = document.getElementById('pass-target-container');
            if (oldTargetContainer) oldTargetContainer.remove();

            const optionsContainer = document.getElementById('q-options');
            optionsContainer.innerHTML = '';
            qData.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.onclick = (e) => checkAnswer(index, e.target);
                optionsContainer.appendChild(btn);
            });

            if (activeJoker && activeJoker.type === 'pass') {
                optionsContainer.style.display = 'none';
                
                const targetDiv = document.createElement('div');
                targetDiv.id = 'pass-target-container';
                targetDiv.innerHTML = '<h3 style="color: var(--burgundy); font-size: 24px; margin-top: 30px;">Has utilitzat el comodí de Cedir Torn.<br>Llegeix el pergamí i tria a quin gremi l\'hi llances:</h3>';
                
                const btnContainer = document.createElement('div');
                btnContainer.style.display = 'flex';
                btnContainer.style.justifyContent = 'center';
                btnContainer.style.gap = '20px';
                btnContainer.style.marginTop = '15px';

                players.forEach((p, index) => {
                    if (index !== currentPlayer) {
                        const btn = document.createElement('button');
                        btn.textContent = p.name;
                        btn.style.padding = '15px 30px';
                        btn.style.fontSize = '20px';
                        btn.onclick = () => {
                            activeJoker.target = index;
                            targetDiv.remove(); 
                            optionsContainer.style.display = 'grid'; 
                            
                            indicatorEl.textContent = `La patata calenta ha estat llançada! Respon: ${players[index].name}`;
                            indicatorEl.style.display = 'block';
                        };
                        btnContainer.appendChild(btn);
                    }
                });
                
                targetDiv.appendChild(btnContainer);
                document.getElementById('action-area').insertBefore(targetDiv, optionsContainer);
                
            } else {
                optionsContainer.style.display = 'grid';
                indicatorEl.textContent = `El destí t'espera! Respon: ${players[currentPlayer].name}`;
                indicatorEl.style.display = 'block';
            }

            document.getElementById('question-modal').style.display = 'flex';
        }

        function checkAnswer(selectedIndex, clickedButton) {
            const qData = gameData.find(q => q.id === currentQuestionId);
            const feedbackEl = document.getElementById('feedback-message');
            const allBtns = document.querySelectorAll('.option-btn');
            
            allBtns.forEach(btn => btn.disabled = true);

            let isCorrect = (selectedIndex === parseInt(qData.correctIndex));
            let points = qData.points;
            let answeringPlayer = currentPlayer;

            if (activeJoker && activeJoker.type === 'pass') answeringPlayer = activeJoker.target;
            if (activeJoker && activeJoker.type === 'double') points *= 2;

            if (isCorrect) {
                clickedButton.classList.add('correct');
                feedbackEl.textContent = "Resposta Correcta!";
                feedbackEl.style.color = "#27ae60";
                
                players[answeringPlayer].score += points;

                if (activeJoker && activeJoker.type === 'attack') {
                    players[activeJoker.target].score -= qData.points; 
                    feedbackEl.textContent += ` I restes ${qData.points} a ${players[activeJoker.target].name}!`;
                }
            } else {
                clickedButton.classList.add('incorrect');
                allBtns[parseInt(qData.correctIndex)].classList.add('correct');
                
                feedbackEl.textContent = "Resposta Incorrecta!";
                feedbackEl.style.color = "#c0392b";
                
                players[answeringPlayer].score -= points;
            }

            if (activeJoker && activeJoker.type === 'double') {
                feedbackEl.textContent += ` (X2 Aplicat!)`;
            } else if (activeJoker && activeJoker.type === 'pass') {
                feedbackEl.textContent += ` (${players[answeringPlayer].name} assumeix el càstig/premi)`;
            }

            feedbackEl.style.display = 'block';
            qData.answered = true;
            activeJoker = null; 

            setTimeout(() => {
                document.getElementById('question-modal').style.display = 'none';
                currentPlayer = (currentPlayer + 1) % players.length;
                renderBoard();
                updateScoreboard();
            }, 5000); 
        }

        // --- ADMIN ---
        function openAdmin() {
            const selector = document.getElementById('edit-selector');
            selector.innerHTML = '';
            gameData.forEach(q => {
                const opt = document.createElement('option');
                opt.value = q.id;
                opt.textContent = `${q.category} - ${q.points} pts`;
                selector.appendChild(opt);
            });
            loadQuestionForEdit();
            document.getElementById('admin-modal').style.display = 'flex';
        }
        function closeAdmin() { document.getElementById('admin-modal').style.display = 'none'; }
        
        function loadQuestionForEdit() {
            const id = document.getElementById('edit-selector').value;
            const qData = gameData.find(q => q.id === id);
            document.getElementById('edit-category').value = qData.category;
            document.getElementById('edit-image').value = qData.image || '';
            document.getElementById('edit-question').value = qData.question;
            document.getElementById('edit-opt0').value = qData.options[0];
            document.getElementById('edit-opt1').value = qData.options[1];
            document.getElementById('edit-opt2').value = qData.options[2];
            document.getElementById('edit-opt3').value = qData.options[3];
            document.getElementById('edit-correct').value = qData.correctIndex;
        }

        // --- PUJAR IMATGE LOCAL I CONVERTIR A BASE64 ---
        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 600;
                    const MAX_HEIGHT = 450;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                    } else {
                        if (height > MAX_HEIGHT) {
                            width *= MAX_HEIGHT / height;
                            height = MAX_HEIGHT;
                        }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.7); 
                    document.getElementById('edit-image').value = dataUrl;
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }

        function saveQuestionEdit() {
            const id = document.getElementById('edit-selector').value;
            const qData = gameData.find(q => q.id === id);
            qData.category = document.getElementById('edit-category').value;
            qData.image = document.getElementById('edit-image').value;
            qData.question = document.getElementById('edit-question').value;
            qData.options = [
                document.getElementById('edit-opt0').value,
                document.getElementById('edit-opt1').value,
                document.getElementById('edit-opt2').value,
                document.getElementById('edit-opt3').value
            ];
            qData.correctIndex = document.getElementById('edit-correct').value;
            const newCategoryName = qData.category;
            gameData.forEach(q => { if(q.col === qData.col) q.category = newCategoryName; });
            saveData();
            alert("El pergamí ha estat segellat amb èxit!");
            openAdmin();
        }
    </script>
